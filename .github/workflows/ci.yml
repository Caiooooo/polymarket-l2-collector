name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint with ruff
        run: uv run ruff check polymarket_l2_collector/ tests/

      - name: Test with pytest
        run: uv run pytest tests/ -v --tb=short

      - name: Smoke test — import
        run: uv run python -c "from polymarket_l2_collector import __version__; print(f'v{__version__}')"
